# Workspace-wide cargo configuration.
#
# RUST_TEST_THREADS: lbug mmaps an 8 TB virtual region per Db::open(). On
# macOS the per-process virtual-memory ceiling is lower than on Linux, and
# default cargo-test parallelism (= CPU cores, ~8-16) exhausts it with:
#
#     Lbug(Buffer manager exception: Mmap for size 8796093022208 failed.)
#
# 4 threads is a compromise: keeps the test wall-clock reasonable while
# staying under the macOS VM ceiling. Override with RUST_TEST_THREADS=N for
# faster runs on machines with more VM headroom; set to 1 if 4 still fails.
#
# Note: LBUG_BUILD_FROM_SOURCE was removed when bumping lbug to 0.17.0.
# Starting with 0.17.0, the prebuilt archive is a self-contained fat bundle
# that ships all third-party static archives (antlr4, fastpfor, parquet,
# zstd, yyjson, …) merged into liblbug.a via BundleStaticLibrary.cmake.
# The cmake source-build path now causes 7399 duplicate-symbol linker errors
# because link_bundled_deps=true links both the fat archive and the individual
# archives simultaneously. See LadybugDB/ladybug-rust#18 for the upstream bug.
# LBUG_VERSION pins the prebuilt lbug native bundle to match the `lbug` crate
# (=0.17.0). Without it, lbug's build.rs downloads the *floating* `latest`
# ladybug release (currently v0.18.1), building the 0.17.0 crate FFI against a
# newer, incompatible native bundle. That skew broke the v0.9.0 release: the
# 0.18.1 bundle links httplib against OpenSSL (`ssl_st`) instead of the bundled
# mbedtls the 0.17.0 self-contained fat archive ships — the macOS release build
# failed with `ld: symbol(s) not found` for OpenSSL symbols. Pinning restores a
# reproducible, self-contained bundle across dev, CI, and release.
[env]
RUST_TEST_THREADS = "4"
LBUG_VERSION = "0.17.0"
