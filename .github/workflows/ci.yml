name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # The prebuilt liblbug.a doesn't ship companion third-party archives;
      # build from source so all deps (fastpfor, brotli, lz4, zstd, yyjson…) are bundled.
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: cargo build
        run: cargo build --release

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo fmt
        run: cargo fmt --check

  bench-stub:
    name: bench compile (stub)
    runs-on: ubuntu-latest
    env:
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cmake
        run: sudo apt-get install -y cmake

      - name: cargo bench --no-run
        run: cargo bench --no-run
