name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # The prebuilt liblbug.a doesn't ship companion third-party archives;
      # build from source so all deps (fastpfor, brotli, lz4, zstd, yyjson…) are bundled.
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cmake (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y cmake

      - name: cargo build
        run: cargo build --release

      - name: cargo test
        run: cargo test

      - name: cargo test ipc_parity
        run: cargo test --test ipc_parity

      - name: check no ML runtime deps
        run: |
          if cargo tree 2>/dev/null | grep -E "tch|candle|onnxruntime|tract"; then
            echo "ERROR: ML runtime dependency detected — violates Principle V"
            exit 1
          fi
          echo "OK: no ML runtime deps found"

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo fmt
        run: cargo fmt --check

  bench-stub:
    name: bench compile (stub)
    runs-on: ubuntu-latest
    env:
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cmake
        run: sudo apt-get install -y cmake

      - name: cargo bench --no-run
        run: cargo bench --no-run

  bench-dedup:
    name: bench-dedup
    runs-on: ubuntu-latest
    env:
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cmake
        run: sudo apt-get install -y cmake

      - name: dedup decision-overlap check (R-007, always runs)
        run: cargo bench --bench search -- dedup_overlap_check

      - name: dedup bench 1k (always runs)
        run: cargo bench --bench search -- 1k --measurement-time 30

      - name: dedup bench 10k (always runs)
        run: cargo bench --bench search -- 10k --measurement-time 30

      - name: dedup bench 50k (main push only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cargo bench --bench search -- dedup_50k
