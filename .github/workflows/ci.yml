name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      # The prebuilt liblbug.a doesn't ship companion third-party archives;
      # build from source so all deps (fastpfor, brotli, lz4, zstd, yyjson…) are bundled.
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

      - name: check no ML runtime deps
        run: |
          # Match crate names only — "tch" must not also match "scratch", etc.
          # cargo tree prints lines like "├── tch v0.18.0"; an awk filter on the
          # crate-name token avoids the substring false positives the prior grep had.
          banned=$(cargo tree 2>/dev/null \
            | awk '{ for (i=1;i<=NF;i++) if ($i ~ /^v[0-9]/) print $(i-1) }' \
            | grep -Ex '(tch|candle|onnxruntime|tract)' || true)
          if [ -n "$banned" ]; then
            echo "ERROR: ML runtime dependency detected — violates Principle V"
            echo "$banned"
            exit 1
          fi
          echo "OK: no ML runtime deps found"

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo fmt
        run: cargo fmt --check

  bench-stub:
    name: bench compile (stub)
    runs-on: ubuntu-latest
    env:
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo bench --no-run
        run: cargo bench --no-run

  bench-dedup:
    name: bench-dedup
    runs-on: ubuntu-latest
    env:
      LBUG_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # R-007 95% overlap is a correctness gate — runs on every PR.
      - name: dedup decision-overlap check (R-007)
        run: cargo bench --bench search -- dedup_overlap_check

      # Perf benches are observation, not gates — only on main push, to keep PR latency low.
      - name: dedup bench 1k
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cargo bench --bench search -- 1k --measurement-time 30

      - name: dedup bench 10k
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cargo bench --bench search -- 10k --measurement-time 30

      - name: dedup bench 50k
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cargo bench --bench search -- dedup_50k
